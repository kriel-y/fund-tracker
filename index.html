<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nora 的全天候投资看板 - 实时盈亏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .up { color: #ef4444; } 
        .down { color: #22c55e; } 
        .glass-panel {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(55, 65, 81, 0.5);
        }
        ::-webkit-scrollbar { display: none; } 
    </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans p-4 md:p-8 min-h-screen bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div class="max-w-7xl mx-auto">
        <!-- 头部资产汇总 -->
        <header class="flex flex-col md:flex-row md:justify-between md:items-end mb-8 border-b border-gray-800 pb-4 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-purple-400 to-emerald-400 tracking-tight mb-2">
                    Nora's Portfolio
                </h1>
                <div class="flex items-baseline gap-4 mt-2">
                    <span class="text-gray-400 text-sm">实时总资产:</span>
                    <span class="text-3xl font-mono font-bold text-gray-100">¥ <span id="total-asset">--</span></span>
                </div>
                <div class="flex items-baseline gap-4 mt-1">
                    <span class="text-gray-400 text-sm">今日总盈亏:</span>
                    <span class="text-xl font-mono font-bold" id="total-profit">--</span>
                </div>
            </div>
            <div class="text-sm font-mono text-blue-400 bg-blue-900/20 px-4 py-2 rounded-lg border border-blue-800/50 flex items-center gap-2" id="last-update">
                <span class="animate-spin inline-block">↻</span> 数据同步中...
            </div>
        </header>

        <!-- 核心持仓列表 -->
        <div class="glass-panel rounded-2xl shadow-2xl overflow-hidden mb-8">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead>
                        <tr class="bg-gray-800/60 text-gray-400 text-sm tracking-wider border-b border-gray-700">
                            <th class="p-4 font-medium">板块</th>
                            <th class="p-4 font-medium">产品名称</th>
                            <th class="p-4 font-medium">持有份额</th>
                            <th class="p-4 font-medium text-blue-300">实时金额 (¥)</th>
                            <th class="p-4 font-medium">仓位占比</th>
                            <th class="p-4 font-medium">当前报价</th>
                            <th class="p-4 font-medium">日内涨幅</th>
                            <th class="p-4 font-medium text-orange-300">今日盈亏 (¥)</th>
                        </tr>
                    </thead>
                    <tbody id="fund-list">
                        <tr><td colspan="8" class="p-10 text-center text-gray-500 font-mono">📡 正在计算实时动态资产...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 【注意】请将下面的 shares 替换为你真实持有的“份额”数字！
        // 只有填入准确的份额，金额才能随着每天的价格波动自动计算。
        // 这里我先填入了一些估算的测试份额。
        const portfolio = [
            { code: 'sh588260', tag: '科创芯片', name: '天弘科创芯片设计ETF', type: 'ETF', shares: 5000, bg: 'bg-indigo-900/40 text-indigo-300 border-indigo-700/50' },
            { code: 'sh513020', tag: '香港科技', name: '国泰中证香港科技ETF', type: 'ETF', shares: 4500, bg: 'bg-blue-900/40 text-blue-300 border-blue-700/50' },
            { code: 'sh515220', tag: '中证煤炭', name: '国泰中证煤炭ETF', type: 'ETF', shares: 3800, bg: 'bg-stone-800 text-stone-300 border-stone-600/50' },
            { code: 'sh515660', tag: '沪深300', name: '国联安沪深300ETF', type: 'ETF', shares: 3500, bg: 'bg-red-900/40 text-red-300 border-red-700/50' },
            { code: 'sz159870', tag: '细分化工', name: '天弘中证细分化工', type: 'ETF', shares: 4000, bg: 'bg-fuchsia-900/40 text-fuchsia-300 border-fuchsia-700/50' },
            { code: 'sh563020', tag: '红利低波', name: '易方达中证红利低波动', type: 'ETF', shares: 3000, bg: 'bg-orange-900/40 text-orange-300 border-orange-700/50' },
            { code: 'sh515450', tag: '红利低波', name: '南方标普红利低波50', type: 'ETF', shares: 2500, bg: 'bg-orange-900/40 text-orange-300 border-orange-700/50' },
            { code: 'sz160616', tag: '石油天然气', name: '鹏华国证油气LOF', type: 'LOF', shares: 2000, bg: 'bg-yellow-900/40 text-yellow-300 border-yellow-700/50' },
            { code: 'sh560060', tag: '电网设备', name: '华夏中证电网设备ETF', type: 'ETF', shares: 2200, bg: 'bg-teal-900/40 text-teal-300 border-teal-700/50' },
            
            // 场外基金的净值是盘后更新，盘中我们用昨日净值估算
            { code: 'sz399395', tag: '锂矿(场外)', name: '富国资源精选C(趋势)', type: '平替', shares: 2000, bg: 'bg-gray-800 text-gray-400 border-gray-600' },
            { code: 'sh000001', tag: '成长(场外)', name: '永赢锐见成长C(趋势)', type: '平替', shares: 1000, bg: 'bg-gray-800 text-gray-400 border-gray-600' }
        ];

        function fetchRealTimeData() {
            const queryCodes = portfolio.map(item => item.code).join(',');
            const script = document.createElement('script');
            script.src = `https://qt.gtimg.cn/q=${queryCodes}&t=${new Date().getTime()}`;
            
            script.onload = () => {
                renderTable();
                document.head.removeChild(script); 
            };
            document.head.appendChild(script);
        }

        function renderTable() {
            const tbody = document.getElementById('fund-list');
            tbody.innerHTML = ''; 

            let totalAssetValue = 0;
            let totalDailyProfit = 0;
            const updatedPortfolio = [];

            // 第一遍循环：计算总资产和各项数据
            portfolio.forEach(asset => {
                const rawData = window[`v_${asset.code}`];
                if (!rawData) return;

                const fields = rawData.split('~');
                const currentPrice = parseFloat(fields[3]); // 实时价格
                const priceChange = parseFloat(fields[31]); // 涨跌额
                const changePercent = parseFloat(fields[32]); // 涨跌幅%

                // 核心计算公式
                const realTimeAmount = asset.shares * currentPrice; // 实时持仓金额
                const dailyProfit = asset.shares * priceChange;     // 实时今日盈亏

                totalAssetValue += realTimeAmount;
                totalDailyProfit += dailyProfit;

                updatedPortfolio.push({
                    ...asset,
                    currentPrice, priceChange, changePercent, realTimeAmount, dailyProfit
                });
            });

            // 第二遍循环：渲染表格（此时已知总资产，可计算准确占比）
            updatedPortfolio.sort((a, b) => b.realTimeAmount - a.realTimeAmount).forEach(asset => {
                const weightPercent = ((asset.realTimeAmount / totalAssetValue) * 100).toFixed(2);
                
                const colorClass = asset.changePercent > 0 ? 'up' : (asset.changePercent < 0 ? 'down' : 'text-gray-400');
                const sign = asset.changePercent > 0 ? '+' : '';

                const tr = document.createElement('tr');
                tr.className = "border-b border-gray-800/50 hover:bg-gray-800/60 transition-colors duration-200";
                tr.innerHTML = `
                    <td class="p-4">
                        <span class="text-xs px-2 py-1 rounded border ${asset.bg} font-medium tracking-wide shadow-sm">${asset.tag}</span>
                    </td>
                    <td class="p-4 font-semibold text-gray-200">${asset.name}</td>
                    <td class="p-4 font-mono text-gray-400">${asset.shares.toLocaleString()}</td>
                    <td class="p-4 font-mono text-blue-300 font-bold bg-blue-900/10">${asset.realTimeAmount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-400 font-mono w-10">${weightPercent}%</span>
                            <div class="w-16 bg-gray-700 rounded-full h-1.5 overflow-hidden">
                                <div class="bg-blue-400 h-1.5 rounded-full" style="width: ${weightPercent}%"></div>
                            </div>
                        </div>
                    </td>
                    <td class="p-4 text-sm font-bold ${colorClass}">${asset.currentPrice.toFixed(3)}</td>
                    <td class="p-4 font-bold ${colorClass}">${sign}${asset.changePercent.toFixed(2)}%</td>
                    <td class="p-4 font-mono font-bold ${colorClass} bg-gray-900/20">${sign}${asset.dailyProfit.toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            });

            // 更新头部汇总数据
            document.getElementById('total-asset').innerText = totalAssetValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            
            const profitSign = totalDailyProfit > 0 ? '+' : '';
            const profitColor = totalDailyProfit > 0 ? 'up' : (totalDailyProfit < 0 ? 'down' : 'text-gray-400');
            document.getElementById('total-profit').className = `text-xl font-mono font-bold ${profitColor}`;
            document.getElementById('total-profit').innerText = `${profitSign}¥${totalDailyProfit.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            const now = new Date();
            document.getElementById('last-update').innerHTML = `<span class="text-emerald-400">●</span> 同步时间: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        }

        fetchRealTimeData();
        setInterval(fetchRealTimeData, 5000);
    </script>
</body>
</html>
