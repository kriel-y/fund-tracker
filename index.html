<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 禁止手机端意外缩放，提供原生 App 体验 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nora 的专属投资看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .up { color: #ef4444; } /* 红涨 */
        .down { color: #22c55e; } /* 绿跌 */
        .glass-panel {
            background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(55, 65, 81, 0.5);
        }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] p-3 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- 头部资产汇总 -->
        <header class="flex flex-col md:flex-row md:justify-between md:items-end mb-6 pb-6 border-b border-gray-800/80 gap-4 mt-2 md:mt-0">
            <div class="text-center md:text-left w-full">
                <h1 class="text-2xl md:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-purple-400 to-emerald-400 tracking-tight mb-4">
                    Nora's Portfolio
                </h1>
                <div class="flex flex-col items-center md:items-start gap-1">
                    <span class="text-gray-500 text-xs">实时预估总资产 (¥)</span>
                    <span class="text-4xl font-mono font-bold text-gray-100" id="total-asset">--</span>
                </div>
                <div class="flex justify-center md:justify-start gap-6 mt-4 bg-gray-900/50 rounded-xl p-3 border border-gray-800">
                    <div class="flex flex-col items-center md:items-start">
                        <span class="text-gray-500 text-[11px]">今日总盈亏</span>
                        <span class="text-lg font-mono font-bold" id="total-profit">--</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- 大盘实时净值雷达 -->
        <div class="grid grid-cols-3 gap-3 mb-6" id="market-indexes">
            <div class="glass-panel p-3 rounded-xl text-center text-gray-500 text-xs">加载上证指数...</div>
            <div class="glass-panel p-3 rounded-xl text-center text-gray-500 text-xs">加载深证成指...</div>
            <div class="glass-panel p-3 rounded-xl text-center text-gray-500 text-xs">加载创业板指...</div>
        </div>

        <!-- 实时策略引擎模块 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <!-- 模块 1：加减仓操作建议 -->
            <div class="glass-panel rounded-xl p-4 border-l-4 border-l-blue-500">
                <h3 class="text-blue-400 font-bold text-sm mb-3 flex items-center gap-2">
                    ⚡ 实时操作指示
                </h3>
                <ul id="strategy-signals" class="text-gray-300 text-xs leading-relaxed space-y-2">
                    <li class="animate-pulse">正在连接量化引擎评估阈值...</li>
                </ul>
            </div>
            
            <!-- 模块 2：行情与进场推荐 -->
            <div class="glass-panel rounded-xl p-4 border-l-4 border-l-emerald-500">
                <h3 class="text-emerald-400 font-bold text-sm mb-3 flex items-center gap-2">
                    🎯 宏观环境与进场推荐
                </h3>
                <ul id="entry-recommendations" class="text-gray-300 text-xs leading-relaxed space-y-2">
                    <li class="animate-pulse">正在解析大盘环境...</li>
                </ul>
            </div>
        </div>

        <!-- 核心持仓列表与排序工具栏 -->
        <div class="glass-panel rounded-2xl shadow-2xl overflow-hidden mb-8">
            <!-- 工具栏 -->
            <div class="px-4 py-3 border-b border-gray-800/60 bg-gray-900/30 flex justify-between items-center">
                <span class="text-sm font-bold text-gray-300">持有资产</span>
                <select id="sort-select" class="bg-gray-800 text-xs text-gray-300 border border-gray-700 rounded p-1 outline-none">
                    <option value="amount-desc">持仓金额 (从大到小)</option>
                    <option value="amount-asc">持仓金额 (从小到大)</option>
                    <option value="profit-desc">今日盈亏 (从高到低)</option>
                    <option value="profit-asc">今日盈亏 (从低到高)</option>
                    <option value="change-desc">涨跌幅 (从高到低)</option>
                </select>
            </div>
            
            <!-- 列表容器 -->
            <div id="fund-list" class="flex flex-col">
                <div class="p-10 text-center text-gray-500 font-mono text-sm">📡 正在同步数据...</div>
            </div>
        </div>
    </div>

    <script>
        // 大盘指数代码
        const indexCodes = ['sh000001', 'sz399001', 'sz399006'];

        // 你的真实持仓（基于截图）
        const portfolio = [
            { code: 'sh588260', tag: '科创芯片', name: '天弘科创芯片设计ETF', baseAmount: 5863.43, bg: 'bg-indigo-900/40 text-indigo-300 border-indigo-700/50' },
            { code: 'sh513020', tag: '香港科技', name: '国泰中证香港科技ETF', baseAmount: 4678.54, bg: 'bg-blue-900/40 text-blue-300 border-blue-700/50' },
            { code: 'sh515220', tag: '中证煤炭', name: '国泰中证煤炭ETF', baseAmount: 4237.67, bg: 'bg-stone-800 text-stone-300 border-stone-600/50' },
            { code: 'sh515660', tag: '沪深300', name: '国联安沪深300ETF', baseAmount: 3900.74, bg: 'bg-red-900/40 text-red-300 border-red-700/50' },
            { code: 'sz159870', tag: '细分化工', name: '天弘中证细分化工ETF', baseAmount: 3838.11, bg: 'bg-fuchsia-900/40 text-fuchsia-300 border-fuchsia-700/50' },
            { code: 'sh563020', tag: '红利低波', name: '易方达中证红利低波动', baseAmount: 3462.44, bg: 'bg-orange-900/40 text-orange-300 border-orange-700/50' },
            { code: 'sh515450', tag: '红利低波', name: '南方红利低波50ETF', baseAmount: 2838.66, bg: 'bg-orange-900/40 text-orange-300 border-orange-700/50' },
            { code: 'sz160616', tag: '石油天然气', name: '鹏华国证石油天然气LOF', baseAmount: 2472.12, bg: 'bg-yellow-900/40 text-yellow-300 border-yellow-700/50' },
            { code: 'sh560060', tag: '电网设备', name: '华夏中证电网设备ETF', baseAmount: 2398.66, bg: 'bg-teal-900/40 text-teal-300 border-teal-700/50' },
            { code: 'sz399395', tag: '锂矿(场外)', name: '富国资源精选混合C', baseAmount: 2218.29, bg: 'bg-gray-800 text-gray-400 border-gray-600' },
            { code: 'sh000001', tag: '成长(场外)', name: '永赢锐见成长混合C', baseAmount: 864.04, bg: 'bg-gray-800 text-gray-400 border-gray-600' }
        ];

        let isInitialized = false;
        let currentSort = 'amount-desc'; // 默认按金额降序

        // 监听排序下拉菜单的变化
        document.getElementById('sort-select').addEventListener('change', (e) => {
            currentSort = e.target.value;
            renderList(); 
        });

        function fetchRealTimeData() {
            const queryCodes = [...indexCodes, ...portfolio.map(item => item.code)].join(',');
            const script = document.createElement('script');
            script.src = `https://qt.gtimg.cn/q=${queryCodes}&t=${new Date().getTime()}`;
            
            script.onload = () => {
                renderIndexes();
                renderList();
                document.head.removeChild(script); 
            };
            document.head.appendChild(script);
        }

        // 1. 渲染顶部大盘指数
        function renderIndexes() {
            const indexContainer = document.getElementById('market-indexes');
            indexContainer.innerHTML = '';
            
            indexCodes.forEach(code => {
                const rawData = window[`v_${code}`];
                if (!rawData) return;
                const fields = rawData.split('~');
                const name = fields[1];
                const price = parseFloat(fields[3]).toFixed(2);
                const changePercent = parseFloat(fields[32]);
                const colorClass = changePercent > 0 ? 'up' : (changePercent < 0 ? 'down' : 'text-gray-400');
                const sign = changePercent > 0 ? '+' : '';

                indexContainer.innerHTML += `
                    <a href="https://gu.qq.com/${code}" target="_blank" class="glass-panel p-2 md:p-3 rounded-xl flex flex-col items-center justify-center hover:bg-gray-800/60 transition-colors">
                        <span class="text-[10px] md:text-xs text-gray-400 mb-1">${name}</span>
                        <span class="font-mono font-bold text-sm md:text-base ${colorClass}">${price}</span>
                        <span class="font-mono text-[10px] md:text-xs ${colorClass}">${sign}${changePercent.toFixed(2)}%</span>
                    </a>
                `;
            });
        }

        // 2. 渲染持仓列表
        function renderList() {
            const listContainer = document.getElementById('fund-list');
            if(!listContainer) return;

            let totalAssetValue = 0;
            let totalDailyProfit = 0;
            const updatedPortfolio = [];

            portfolio.forEach(asset => {
                const rawData = window[`v_${asset.code}`];
                if (!rawData) return;
                const fields = rawData.split('~');
                const currentPrice = parseFloat(fields[3]); 
                const priceChange = parseFloat(fields[31]); 
                const changePercent = parseFloat(fields[32]); 

                if (!isInitialized) {
                    const basePrice = (asset.code === 'sh000001' || asset.code === 'sz399395') 
                                      ? (currentPrice - priceChange) : currentPrice;
                    asset.calculatedShares = asset.baseAmount / (basePrice || 1);
                }

                const realTimeAmount = asset.calculatedShares * currentPrice;
                const dailyProfit = asset.calculatedShares * priceChange;

                totalAssetValue += realTimeAmount;
                totalDailyProfit += dailyProfit;

                updatedPortfolio.push({
                    ...asset, currentPrice, priceChange, changePercent, realTimeAmount, dailyProfit
                });
            });

            isInitialized = true; 

            // 根据下拉框应用排序逻辑
            updatedPortfolio.sort((a, b) => {
                if (currentSort === 'amount-desc') return b.realTimeAmount - a.realTimeAmount;
                if (currentSort === 'amount-asc') return a.realTimeAmount - b.realTimeAmount;
                if (currentSort === 'profit-desc') return b.dailyProfit - a.dailyProfit;
                if (currentSort === 'profit-asc') return a.dailyProfit - b.dailyProfit;
                if (currentSort === 'change-desc') return b.changePercent - a.changePercent;
                return 0;
            });

            listContainer.innerHTML = '';
            updatedPortfolio.forEach(asset => {
                const weightPercent = ((asset.realTimeAmount / totalAssetValue) * 100).toFixed(2);
                const colorClass = asset.changePercent > 0 ? 'up' : (asset.changePercent < 0 ? 'down' : 'text-gray-400');
                const sign = asset.changePercent > 0 ? '+' : '';

                // 点击直达详情页
                let detailUrl = asset.code.includes('sh') || asset.code.includes('sz') 
                    ? `https://gu.qq.com/${asset.code}` 
                    : `https://fund.eastmoney.com/${asset.code.replace(/[a-zA-Z]/g, '')}.html`;

                const itemDiv = document.createElement('a'); 
                itemDiv.href = detailUrl;
                itemDiv.target = "_blank"; 
                itemDiv.className = "flex flex-col md:flex-row justify-between p-4 border-b border-gray-800/60 hover:bg-gray-800/80 transition-colors block cursor-pointer";
                
                itemDiv.innerHTML = `
                    <div class="flex flex-col justify-center mb-3 md:mb-0 md:w-5/12">
                        <div class="flex items-center gap-2 mb-1.5">
                            <span class="font-bold text-gray-100 text-[15px] tracking-wide">${asset.name}</span>
                            <span class="text-[10px] px-1.5 py-0.5 rounded border ${asset.bg} font-medium whitespace-nowrap">${asset.tag}</span>
                        </div>
                        <div class="flex items-center gap-3 text-xs text-gray-500 font-mono">
                            <span class="text-gray-300 font-semibold">¥${asset.realTimeAmount.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                            <div class="flex items-center gap-1.5 w-24 opacity-80">
                                <span>${weightPercent}%</span>
                                <div class="flex-1 bg-gray-800 rounded-full h-1 overflow-hidden">
                                    <div class="bg-blue-500 h-1 rounded-full" style="width: ${weightPercent}%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between md:w-7/12 md:justify-end md:gap-10 items-end md:items-center">
                        <div class="text-left md:text-right">
                            <div class="text-[11px] text-gray-500 mb-1">当前行情</div>
                            <div class="font-mono font-bold text-sm ${colorClass}">${asset.currentPrice.toFixed(3)}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-[11px] text-gray-500 mb-1">日内走势</div>
                            <div class="font-mono font-bold text-sm ${colorClass}">${sign}${asset.changePercent.toFixed(2)}%</div>
                        </div>
                        <div class="text-right min-w-[70px]">
                            <div class="text-[11px] text-gray-500 mb-1 flex items-center justify-end gap-1">今日盈亏 <span class="text-gray-600 text-[10px]">▶</span></div>
                            <div class="font-mono font-bold text-[15px] ${colorClass}">${sign}${asset.dailyProfit.toFixed(2)}</div>
                        </div>
                    </div>
                `;
                listContainer.appendChild(itemDiv);
            });

            document.getElementById('total-asset').innerText = totalAssetValue.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            const profitSign = totalDailyProfit > 0 ? '+' : '';
            const profitColor = totalDailyProfit > 0 ? 'up' : (totalDailyProfit < 0 ? 'down' : 'text-gray-400');
            document.getElementById('total-profit').className = `text-xl font-mono font-bold ${profitColor}`;
            document.getElementById('total-profit').innerText = `${profitSign}¥${totalDailyProfit.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        // 3. 连接 Cloudflare Worker 获取量化策略建议
        // ⚠️ 请把你刚刚部署好的 Cloudflare Worker 链接替换到这里
        const WORKER_API_URL = 'https://fund-tracker.1239737251.workers.dev/'; 

        async function fetchQuantStrategy() {
            // 如果还没替换 URL，就直接显示提示
            if (WORKER_API_URL.includes('你的worker名字')) {
                document.getElementById('strategy-signals').innerHTML = '<li class="text-gray-400 text-xs">⚠️ 请在代码中配置您的 Cloudflare Worker URL 以激活量化引擎。</li>';
                document.getElementById('entry-recommendations').innerHTML = '<li class="text-gray-400 text-xs">待接入量化引擎后获取环境分析...</li>';
                return;
            }

            try {
                const response = await fetch(WORKER_API_URL);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const signalsContainer = document.getElementById('strategy-signals');
                    signalsContainer.innerHTML = data.signals.map(sig => `<li>${sig.text}</li>`).join('');
                    
                    const recsContainer = document.getElementById('entry-recommendations');
                    recsContainer.innerHTML = data.recommendations.map(rec => `<li>${rec.text}</li>`).join('');
                }
            } catch (error) {
                console.error('策略引擎连接失败:', error);
                document.getElementById('strategy-signals').innerHTML = '<li class="text-red-400">量化引擎连接超时，请检查网络。</li>';
            }
        }

        // 初始化启动所有数据拉取
        fetchRealTimeData();
        fetchQuantStrategy();

        // 基金行情每 5 秒刷新，策略建议每 60 秒刷新
        setInterval(fetchRealTimeData, 5000);
        setInterval(fetchQuantStrategy, 60000); 
    </script>
</body>
</html>
